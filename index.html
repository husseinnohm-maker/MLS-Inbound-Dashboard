<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbound Logistics Operations Console</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#0b1329',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        },
                        neonBlue: '#00f6ff',
                        emeraldNeon: '#10b981',
                        amberNeon: '#f59e0b',
                        crimsonNeon: '#ef4444'
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons for modern symbols -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
        /* Custom scrollbar styling for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00f6ff;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- Primary React Render Mount Point -->
    <div id="root"></div>

    <!-- React, ReactDOM, and Babel Standalone for direct execution -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.9/babel.min.js"></script>

    <!-- ApexCharts (Premium dark-theme charts) -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <!-- Google Identity Services for Drive/OAuth Connection -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- CRUCIAL: PapaParse for robust CSV Parsing (Fixes the 1 record crash on large datasets) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- React Application Component script -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Hardcoded Default Published Google Sheet CSV URL as requested
        const DEFAULT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUlga7d_wzD6jI-nCCPYgzPtyXalpfewpiKvsy00szeprYTyb0g3BIHs4aKx4n7LqVv8HZTMOUp5gu/pub?output=csv";

        // Stability helpers: normalize text consistently, parse dates safely, and prevent stalled network requests
        const GRID_PAGE_SIZE = 250;
        const MAX_DROPDOWN_OPTIONS = 300;

        const cleanText = (value, fallback = '') => {
            const cleaned = String(value ?? '').trim().replace(/\s+/g, ' ');
            return cleaned || fallback;
        };

        const comparableText = (value) => cleanText(value).toLocaleLowerCase();
        const sameText = (left, right) => comparableText(left) === comparableText(right);
        const hasSelectedValue = (selectedValues, rowValue) => (
            selectedValues.length === 0 || selectedValues.some(value => sameText(value, rowValue))
        );

        // Division values are intentionally standardized to uppercase so case-only differences do not create duplicate filters.
        const normalizeDivision = (value) => cleanText(value, 'UNKNOWN').toUpperCase();

        const safeNumber = (value) => {
            const parsed = Number(cleanText(value, '0').replace(/,/g, ''));
            return Number.isFinite(parsed) ? parsed : 0;
        };

        const parseSheetDate = (value) => {
            const raw = cleanText(value, 'N/A');
            if (!raw || comparableText(raw) === 'n/a') {
                return { label: 'N/A', year: '', month: '', sort: Number.MAX_SAFE_INTEGER };
            }

            let day;
            let month;
            let year;
            const directMatch = raw.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);

            if (directMatch) {
                day = Number(directMatch[1]);
                month = Number(directMatch[2]);
                year = Number(directMatch[3]);
            } else {
                const parsedDate = new Date(raw);
                if (Number.isNaN(parsedDate.getTime())) {
                    return { label: raw, year: '', month: '', sort: Number.MAX_SAFE_INTEGER };
                }
                day = parsedDate.getDate();
                month = parsedDate.getMonth() + 1;
                year = parsedDate.getFullYear();
            }

            const checkDate = new Date(year, month - 1, day);
            if (
                Number.isNaN(checkDate.getTime()) ||
                checkDate.getFullYear() !== year ||
                checkDate.getMonth() !== month - 1 ||
                checkDate.getDate() !== day
            ) {
                return { label: raw, year: '', month: '', sort: Number.MAX_SAFE_INTEGER };
            }

            // Updated Format to: 1-Jun-2026
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const formattedMonth = monthNames[month - 1];

            return {
                label: `${day}-${formattedMonth}-${year}`,
                year: String(year),
                month: formattedMonth,
                sort: Date.UTC(year, month - 1, day)
            };
        };

        const parseDurationMinutes = (value) => {
            const raw = cleanText(value);
            if (!raw) return null;

            const parts = raw.split(':').map(part => Number(part));
            if (parts.every(Number.isFinite)) {
                if (parts.length === 3) return (parts[0] * 60) + parts[1] + (parts[2] / 60);
                if (parts.length === 2) return (parts[0] * 60) + parts[1];
            }

            const numeric = Number(raw);
            return Number.isFinite(numeric) ? numeric : null;
        };

        const fetchWithTimeout = async (url, options = {}, timeoutMs = 20000) => {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { ...options, signal: controller.signal });
            } finally {
                clearTimeout(timeoutId);
            }
        };

        class DashboardErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError() {
                return { hasError: true };
            }

            componentDidCatch(error, info) {
                console.error('Dashboard render error:', error, info);
            }

            render() {
                if (!this.state.hasError) return this.props.children;
                return (
                    <div className="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
                        <div className="max-w-lg w-full bg-slate-900 border border-red-500/50 rounded-2xl p-6 shadow-2xl text-center">
                            <i className="fa-solid fa-triangle-exclamation text-red-400 text-3xl mb-4"></i>
                            <h1 className="text-lg font-extrabold text-white mb-2">Dashboard recovered from an unexpected error</h1>
                            <p className="text-xs text-slate-400 leading-relaxed mb-5">
                                Reload the page to reconnect the sheet. The stability safeguards will prevent large filter results from overloading the audit grid.
                            </p>
                            <button
                                type="button"
                                onClick={() => window.location.reload()}
                                className="bg-red-950 hover:bg-red-900 border border-red-500/60 text-red-200 rounded-lg px-4 py-2 text-xs font-bold"
                            >
                                Reload Dashboard
                            </button>
                        </div>
                    </div>
                );
            }
        }

        function MultiSelect({ label, options, selectedValues, onChange, placeholder }) {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const dropdownRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                        setSearchTerm(''); // clear search on close
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const handleSearch = (e) => {
                const val = e.target.value;
                setSearchTerm(val);

                if (val.includes(',')) {
                    const parts = val.split(',').map(p => p.trim().toLowerCase()).filter(p => p);
                    if (parts.length > 0) {
                        const matchingOptions = options.filter(opt => parts.includes(String(opt).toLowerCase()));
                        if (matchingOptions.length > 0) {
                            const newSelections = Array.from(new Set([...selectedValues, ...matchingOptions]));
                            onChange(newSelections);
                            setSearchTerm('');
                        }
                    }
                }
            };

            const toggleOption = (val) => {
                if (selectedValues.includes(val)) {
                    onChange(selectedValues.filter(v => v !== val));
                } else {
                    onChange([...selectedValues, val]);
                }
            };

            const selectAll = () => onChange([...options]);
            const clearAll = () => onChange([]);

            const matchingOptions = options.filter(opt => 
                String(opt).toLowerCase().includes(searchTerm.toLowerCase())
            );
            const filteredOptions = matchingOptions.slice(0, MAX_DROPDOWN_OPTIONS);

            return (
                <div className="space-y-1 relative" ref={dropdownRef}>
                    <label className="text-[9px] text-slate-400 uppercase font-semibold block">{label}</label>
                    <button
                        type="button"
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-neonBlue font-medium flex items-center justify-between text-left h-[28px] hover:border-slate-700 transition"
                    >
                        <span className="truncate">
                            {selectedValues.length === 0 
                                ? `ALL ${placeholder || ''}` 
                                : `${selectedValues.length} Selected`
                            }
                        </span>
                        <i className="fa-solid fa-chevron-down text-[8px] text-slate-500"></i>
                    </button>
                    
                    {isOpen && (
                        <div className="absolute z-50 left-0 right-0 mt-1 bg-slate-900 border border-slate-700 rounded shadow-xl flex flex-col max-h-64 min-w-[180px]">
                            <div className="p-1.5 border-b border-slate-800">
                                <input 
                                    type="text" 
                                    placeholder="Search or paste comma list..."
                                    value={searchTerm}
                                    onChange={handleSearch}
                                    className="w-full bg-slate-950 border border-slate-700 rounded text-[10px] px-2 py-1.5 text-slate-200 focus:outline-none focus:border-neonBlue"
                                />
                            </div>
                            
                            <div className="flex items-center justify-between border-b border-slate-800 pb-1 pt-1 text-[9px] font-bold text-slate-400 px-2">
                                <button type="button" onClick={selectAll} className="hover:text-neonBlue">Select All</button>
                                <button type="button" onClick={clearAll} className="hover:text-crimsonNeon">Clear</button>
                            </div>

                            <div className="overflow-y-auto p-1 space-y-0.5 flex-1">
                                {matchingOptions.length > MAX_DROPDOWN_OPTIONS && (
                                    <div className="text-[9px] text-amber-400 px-1.5 py-1 border-b border-slate-800">
                                        Showing first {MAX_DROPDOWN_OPTIONS} matches. Type to narrow the list.
                                    </div>
                                )}
                                {filteredOptions.length === 0 ? (
                                    <div className="text-[10px] text-slate-500 text-center py-2">No matches found</div>
                                ) : (
                                    filteredOptions.map(opt => {
                                        const isChecked = selectedValues.includes(opt);
                                        return (
                                            <label key={opt} className="flex items-center gap-2 px-1.5 py-1 hover:bg-slate-800 rounded cursor-pointer text-[10px] text-slate-300 select-none">
                                                <input 
                                                    type="checkbox" 
                                                    checked={isChecked}
                                                    onChange={() => toggleOption(opt)}
                                                    className="rounded bg-slate-950 border-slate-700 text-neonBlue focus:ring-0 focus:ring-offset-0 w-3.5 h-3.5 accent-cyan-500 cursor-pointer"
                                                />
                                                <span className="truncate">{opt || '(Blank)'}</span>
                                            </label>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            // State variables
            const [dataset, setDataset] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [loadError, setLoadError] = useState(null);
            const [showOnboarding, setShowOnboarding] = useState(true);
            const [showGoogleModal, setShowGoogleModal] = useState(false);
            const [gdriveConfig, setGdriveConfig] = useState({ clientId: '', sheetUrl: DEFAULT_CSV_URL });
            const [toasts, setToasts] = useState([]);
            
            // Slicers State as arrays for multiple-selection options
            const [slicers, setSlicers] = useState({
                year: [],
                month: [],
                date: [],
                division: [],
                warehouse: [],
                trxType: [],
                shipmentType: [],
                inboundType: [],
                grnStatus: [],
                delayReason: [],
                asn: [],
                searchTerm: ''
            });

            // Column Dropdown filters state (for inline table headers)
            const [tableHeaderFilters, setTableHeaderFilters] = useState({});

            const [gridPage, setGridPage] = useState(1);
            const [debouncedSearchTerm, setDebouncedSearchTerm] = useState('');

            useEffect(() => {
                const timer = setTimeout(() => {
                    setDebouncedSearchTerm(slicers.searchTerm);
                }, 250);
                return () => clearTimeout(timer);
            }, [slicers.searchTerm]);

            // Unique options derived from current FULL imported dataset for filters
            const dynamicSlicerOptions = useMemo(() => {
                if (!dataset.length) return {
                    years: [], months: [], dates: [], divisions: [], warehouses: [],
                    trxTypes: [], shipmentTypes: [], inboundTypes: [], grnStatuses: [], delayReasons: [], asns: []
                };

                const years = new Set();
                const months = new Set();
                const dates = new Set();
                const divisions = new Set();
                const warehouses = new Set();
                const trxTypes = new Set();
                const shipmentTypes = new Set();
                const inboundTypes = new Set();
                const grnStatuses = new Set();
                const delayReasons = new Set();
                const asns = new Set(); 

                dataset.forEach(row => {
                    if (row.Date_Year) years.add(row.Date_Year);
                    if (row.Date_Month) months.add(row.Date_Month);
                    if (row.Division) divisions.add(row.Division);
                    if (row.WH) warehouses.add(row.WH);
                    if (row.Trx_Type) trxTypes.add(row.Trx_Type);
                    if (row.Shipment_Type) shipmentTypes.add(row.Shipment_Type);
                    if (row.Inbound_Type) inboundTypes.add(row.Inbound_Type);
                    if (row.GRN_Status) grnStatuses.add(row.GRN_Status);
                    if (row.Delay_Reason) delayReasons.add(row.Delay_Reason);
                    if (row.ASN) asns.add(row.ASN); 

                    // Cascading logic: Only populate dates that match selected Months/Years
                    const matchesYear = slicers.year.length === 0 || slicers.year.includes(row.Date_Year);
                    const matchesMonth = slicers.month.length === 0 || slicers.month.includes(row.Date_Month);
                    
                    if (matchesYear && matchesMonth && row.Date && row.Date !== 'N/A') {
                        dates.add(row.Date);
                    }
                });

                const alphabetical = (a, b) => String(a).localeCompare(String(b), undefined, { sensitivity: 'base' });

                return {
                    years: Array.from(years).sort(),
                    months: Array.from(months).sort(),
                    dates: Array.from(dates).sort((a, b) => parseSheetDate(a).sort - parseSheetDate(b).sort),
                    divisions: Array.from(divisions).sort(alphabetical),
                    warehouses: Array.from(warehouses).sort(alphabetical),
                    trxTypes: Array.from(trxTypes).sort(alphabetical),
                    shipmentTypes: Array.from(shipmentTypes).sort(alphabetical),
                    inboundTypes: Array.from(inboundTypes).sort(alphabetical),
                    grnStatuses: Array.from(grnStatuses).sort(alphabetical),
                    delayReasons: Array.from(delayReasons).sort(alphabetical),
                    asns: Array.from(asns).sort(alphabetical)
                };
            }, [dataset, slicers.year, slicers.month]); // Dependent on Year/Month for cascading

            const showToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 5000);
            };

            // Replaces the old buggy text loop with the stable PapaParse implementation
            const parseCSV = (text) => {
                const parsed = Papa.parse(text, { skipEmptyLines: true });
                return parsed.data;
            };

            const processParsedRawData = (rows) => {
                if (!rows || rows.length < 2) {
                    showToast("Insufficient data or empty spreadsheet format detected.", "error");
                    return false;
                }

                // Guard to detect if Google returns an HTML error page (like 'Document too large') instead of CSV data
                const firstCell = String(rows[0][0] || '').trim().toLowerCase();
                if (firstCell.startsWith('<!doctype') || firstCell.startsWith('<html')) {
                    showToast("Connection Denied: Google returned an HTML page instead of CSV.", "error");
                    setLoadError("Google Sheets blocked the request. This happens if the sheet is restricted, or if the 'Published' link reached a size limit. Click 'Connect Feed Source' and paste the standard sharing link instead.");
                    return false;
                }

                const headers = rows[0].map(h => cleanText(h));
                
                const findIdx = (names) => {
                    for (let name of names) {
                        const idx = headers.findIndex(h => h.toLowerCase() === name.toLowerCase());
                        if (idx !== -1) return idx;
                    }
                    return -1;
                };

                const idxSer = findIdx(['Ser#', 'Ser', 'Serial']);
                const idxWH = findIdx(['WH', 'Warehouse']);
                const idxDate = findIdx(['Date']);
                const idxASN = findIdx(['ASN#/Child PO/STR', 'ASN#', 'ASN']);
                const idxTruck = findIdx(['Truck#', 'Truck', 'Vehicle']);
                const idxDivision = findIdx(['Division']);
                const idxTrxType = findIdx(['Trx Type', 'TrxType']);
                const idxShipmentType = findIdx(['Shipment Type', 'ShipmentType']);
                const idxInboundType = findIdx(['Inbound Type', 'InboundType']);
                const idxTotalQty = findIdx(['Total Qty', 'TotalQty', 'Total Quantity']);
                const idxGoodQty = findIdx(['Good Qty', 'GoodQty']);
                const idxDamageQty = findIdx(['Damage Qty', 'DamageQty']);
                const idxShortageQty = findIdx(['Shortage Qty', 'ShortageQty']);
                const idxExcessQty = findIdx(['Excess Qty', 'ExcessQty']);
                const idxTotalPallets = findIdx(['TOTAL Pallets', 'Total Pallets']);
                const idxGRNStatus = findIdx(['GRN Status', 'GRNStatus']);
                const idxGRNKPI = findIdx(['GRN KPI', 'GRNKPI']);
                const idxOffLoadingDuration = findIdx(['Off-Loading Duration', 'Offloading Duration', 'Duration']);
                const idxDelayReason = findIdx(['Delay Reason', 'DelayReason']);
                const idxPutAway = findIdx(['# of Put-Away lines', 'Putaway Lines', 'Put-away lines']);
                const idxStorageType = findIdx(['Storage Type', 'StorageType', 'Storage Zone']);
                const idxPOOnTime = findIdx(['PO/ASN ON TIME', 'PO/ASN ON-TIME']);

                const formatted = [];
                for (let r = 1; r < rows.length; r++) {
                    const rowData = rows[r];
                    if (!rowData || rowData.length === 0 || rowData.every(cell => cleanText(cell) === '')) continue;

                    const valueAt = (idx, fallback = '') => idx >= 0 ? cleanText(rowData[idx], fallback) : fallback;
                    const dateMeta = parseSheetDate(valueAt(idxDate, 'N/A'));

                    formatted.push({
                        Ser: valueAt(idxSer, r.toString()),
                        WH: valueAt(idxWH, 'Unknown'),
                        Date: dateMeta.label,
                        Date_Year: dateMeta.year,
                        Date_Month: dateMeta.month,
                        Date_Sort: dateMeta.sort,
                        ASN: valueAt(idxASN, 'N/A'),
                        Truck: valueAt(idxTruck, 'N/A'),
                        Division: normalizeDivision(valueAt(idxDivision, 'Unknown')),
                        Trx_Type: valueAt(idxTrxType, 'N/A'),
                        Shipment_Type: valueAt(idxShipmentType, 'N/A'),
                        Inbound_Type: valueAt(idxInboundType, 'N/A'),
                        Total_Qty: safeNumber(rowData[idxTotalQty]),
                        Good_Qty: safeNumber(rowData[idxGoodQty]),
                        Damage_Qty: safeNumber(rowData[idxDamageQty]),
                        Shortage_Qty: safeNumber(rowData[idxShortageQty]),
                        Excess_Qty: safeNumber(rowData[idxExcessQty]),
                        Total_Pallets: safeNumber(rowData[idxTotalPallets]),
                        GRN_Status: valueAt(idxGRNStatus, 'Pending'),
                        GRN_KPI: valueAt(idxGRNKPI),
                        Off_Loading_Duration: valueAt(idxOffLoadingDuration),
                        Delay_Reason: valueAt(idxDelayReason),
                        PutAway_Lines: safeNumber(rowData[idxPutAway]),
                        Storage_Type: valueAt(idxStorageType, 'Dry'),
                        PO_On_Time: valueAt(idxPOOnTime)
                    });
                }

                setDataset(formatted);
                setShowOnboarding(false);
                setLoadError(null);
                showToast(`Successfully processed ${formatted.length} active records!`, "success");
                return true;
            };

            const fetchDefaultDatabase = async () => {
                setIsLoading(true);
                setLoadError(null);
                showToast("Initiating direct connection to Google Sheets...", "info");

                try {
                    const directUrl = `${DEFAULT_CSV_URL}&t=${Date.now()}`;
                    const directResponse = await fetchWithTimeout(directUrl, { cache: "no-store" });
                    if (!directResponse.ok) {
                        throw new Error(`Direct connection returned HTTP status ${directResponse.status}`);
                    }
                    const text = await directResponse.text();
                    const parsedRaw = parseCSV(text);
                    const success = processParsedRawData(parsedRaw);
                    if (success) return;
                } catch (directError) {
                    console.warn("Direct fetch was blocked or failed, attempting secure CORS proxy fallback...", directError);
                    showToast("Direct download blocked. Retrying via secure AllOrigins proxy...", "info");
                    
                    try {
                        const proxiedUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(DEFAULT_CSV_URL)}&nocache=${Date.now()}`;
                        const proxyResponse = await fetchWithTimeout(proxiedUrl);
                        if (!proxyResponse.ok) {
                            throw new Error(`Proxy stream returned status ${proxyResponse.status}`);
                        }
                        const proxyData = await proxyResponse.json();
                        if (!proxyData.contents) {
                            throw new Error("No data contents returned from proxy query.");
                        }
                        const parsedRaw = parseCSV(proxyData.contents);
                        const success = processParsedRawData(parsedRaw);
                        if (!success) {
                            throw new Error("Empty data returned or failed to process rows.");
                        }
                    } catch (proxyError) {
                        console.error("All fetch vectors exhausted:", proxyError);
                        setLoadError("Unable to fetch Google Sheets data. Check your connection or retry below.");
                        showToast("Google Sheets stream failed. Please upload local CSV or click reconnect.", "error");
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLocalFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsLoading(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const rawText = event.target.result;
                        const parsedRaw = parseCSV(rawText);
                        processParsedRawData(parsedRaw);
                    } catch (error) {
                        showToast("Error processing local CSV file: " + error.message, "error");
                    } finally {
                        setIsLoading(false);
                    }
                };
                reader.readAsText(file);
            };

            const connectGoogleSheetLink = async () => {
                const urlInput = gdriveConfig.sheetUrl.trim();
                if (!urlInput) {
                    showToast("Please enter a valid Google Sheets URL.", "error");
                    return;
                }

                setIsLoading(true);
                setLoadError(null);
                try {
                    let exportUrl = urlInput;
                    
                    if (urlInput.includes("docs.google.com/spreadsheets") && !urlInput.includes("output=csv") && !urlInput.includes("export?format=csv")) {
                        const sheetIdMatch = urlInput.match(/\/d\/([a-zA-Z0-9-_]+)/);
                        if (!sheetIdMatch) {
                            throw new Error("Unable to parse a valid Google Spreadsheet ID from the URL.");
                        }
                        const spreadsheetId = sheetIdMatch[1];
                        let gid = "0";
                        const gidMatch = urlInput.match(/[#&]gid=([0-9]+)/);
                        if (gidMatch) {
                            gid = gidMatch[1];
                        }
                        exportUrl = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}`;

                    const resJson = await response.json();

                        const parsed = parseCSV(resJson.contents);
                        const success = processParsedRawData(parsed);
                        if (success) {

                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl lg:col-span-4">
                                <h4 className="text-xs font-bold text-white uppercase tracking-wider mb-3">Shipment Mode Mix</h4>
                                <div id="chart-shipment">
                                    {filteredDataset.length === 0 && (
                                        <div className="h-64 flex items-center justify-center text-slate-500 text-xs">Waiting for active data...</div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl lg:col-span-4">
                                <h4 className="text-xs font-bold text-white uppercase tracking-wider mb-3">Floor Efficiency Processing Speeds</h4>
                                <div id="chart-efficiency">
                                    {filteredDataset.length === 0 && (
                                        <div className="h-64 flex items-center justify-center text-slate-500 text-xs">Waiting for active data...</div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl lg:col-span-6">
                                <h4 className="text-xs font-bold text-white uppercase tracking-wider mb-3 text-crimsonNeon">Root-Cause Delay Pareto Matrix</h4>
                                <div id="chart-delay">
                                    {filteredDataset.length === 0 && (
                                        <div className="h-64 flex items-center justify-center text-slate-500 text-xs">Waiting for active data...</div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl lg:col-span-6">
                                <h4 className="text-xs font-bold text-white uppercase tracking-wider mb-3 text-neonBlue">Storage Zone Footprint</h4>
                                <div id="chart-storage">
                                    {filteredDataset.length === 0 && (
                                        <div className="h-64 flex items-center justify-center text-slate-500 text-xs">Waiting for active data...</div>
                                    )}
                                </div>
                            </div>

                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl">
                            <div className="p-4 bg-slate-850/50 border-b border-slate-800 flex flex-wrap items-center justify-between gap-3">
                                <div className="flex items-center gap-2">
                                    <div className="w-2.5 h-2.5 bg-neonBlue rounded-full animate-ping"></div>
                                    <h3 className="text-xs font-extrabold text-white uppercase tracking-wider">
                                        Master Operations Audit Grid
                                    </h3>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="text-[10px] text-slate-400 font-medium hidden md:block">
                                        Directly filter each column independently using dropdown filters inside column headers.
                                    </div>
                                    <button 
                                        onClick={exportToExcel}
                                        className="bg-emerald-950 hover:bg-emerald-900 border border-emerald-500/50 hover:border-emerald-400 text-emerald-400 rounded px-3 py-1.5 text-[10px] font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-file-excel"></i>
                                        Export Excel
                                    </button>
                                </div>
                            </div>

                            <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                                <table className="w-full text-[11px] text-left border-collapse">
                                    <thead className="sticky top-0 bg-slate-950 z-25 text-slate-400 uppercase border-b border-slate-800 text-[10px] font-bold">
                                        <tr>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>Ser#</span>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>WH</span>
                                                    <select 
                                                        value={tableHeaderFilters['WH'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, WH: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('WH').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>Date</span>
                                                    <select 
                                                        value={tableHeaderFilters['Date'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Date: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Date').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800 min-w-[120px]">
                                                <div className="flex flex-col gap-1">
                                                    <span>ASN#/Child PO</span>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800 min-w-[100px]">
                                                <div className="flex flex-col gap-1">
                                                    <span>Truck#</span>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>Division</span>
                                                    <select 
                                                        value={tableHeaderFilters['Division'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Division: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Division').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>Trx Type</span>
                                                    <select 
                                                        value={tableHeaderFilters['Trx_Type'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Trx_Type: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Trx_Type').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">

                                                        value={tableHeaderFilters['Shipment_Type'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Shipment_Type: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Shipment_Type').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>Inbound Type</span>
                                                    <select 
                                                        value={tableHeaderFilters['Inbound_Type'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Inbound_Type: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Inbound_Type').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">Total Qty</th>
                                            <th className="p-3 border-r border-slate-800">Damage</th>
                                            <th className="p-3 border-r border-slate-800">Shortage</th>
                                            <th className="p-3 border-r border-slate-800">Pallets</th>
                                            <th className="p-3 border-r border-slate-800">

                                                        value={tableHeaderFilters['GRN_Status'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, GRN_Status: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('GRN_Status').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>GRN KPI</span>
                                                    <select 
                                                        value={tableHeaderFilters['GRN_KPI'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, GRN_KPI: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('GRN_KPI').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>

                                                    <span>Delay Reason</span>

                                                        value={tableHeaderFilters['Delay_Reason'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Delay_Reason: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Delay_Reason').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800 bg-slate-900/40">
                                        {filteredDataset.length === 0 ? (
                                            <tr>
                                                <td colSpan="18" className="p-8 text-center text-slate-500 text-xs">
                                                    No operational logs match your active filters. Clear slicers or load a dataset.
                                                </td>
                                            </tr>
                                        ) : (
                                            paginatedDataset.map((row, index) => (
                                                <tr key={`${row.Ser}-${gridStartIndex + index}`} className="hover:bg-slate-800/50 transition">
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-400 font-mono">{row.Ser}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-semibold">{row.WH}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-300 font-medium whitespace-nowrap">{row.Date}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-neonBlue font-mono">{row.ASN}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-300 font-mono whitespace-nowrap">{row.Truck}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-semibold">{row.Division}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-400">{row.Trx_Type}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-400">{row.Shipment_Type}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-medium">{row.Inbound_Type}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-bold text-white">{row.Total_Qty.toLocaleString()}</td>
                                                    <td className={`p-3 border-r border-slate-800/60 font-bold ${row.Damage_Qty > 0 ? 'text-crimsonNeon bg-red-950/20' : 'text-slate-500'}`}>{row.Damage_Qty}</td>
                                                    <td className={`p-3 border-r border-slate-800/60 font-bold ${row.Shortage_Qty > 0 ? 'text-crimsonNeon bg-red-950/20' : 'text-slate-500'}`}>{row.Shortage_Qty}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-bold text-slate-300">{row.Total_Pallets}</td>
                                                    <td className="p-3 border-r border-slate-800/60">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                                                            sameText(row.GRN_Status, 'Sent') ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' :
                                                            sameText(row.GRN_Status, 'Received') ? 'bg-emerald-950 text-emerald-300 border border-emerald-900' :
                                                            'bg-amber-950 text-amber-400 border border-amber-800'
                                                        }`}>
                                                            {row.GRN_Status}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 border-r border-slate-800/60">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                                                            (row.GRN_KPI || '').toLowerCase() === 'on-time' || (row.GRN_KPI || '').toLowerCase() === 'received'
                                                                ? 'bg-emerald-950 text-emerald-400' 
                                                                : 'bg-red-950 text-red-400'
                                                        }`}>
                                                            {row.GRN_KPI || 'Pending'}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 border-r border-slate-800/60">{row.PO_On_Time || 'N/A'}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-300 font-mono font-bold">{row.Off_Loading_Duration || '--'}</td>
                                                    <td className="p-3">
                                                        {row.Delay_Reason ? (
                                                            <span className="text-crimsonNeon font-medium bg-red-950/30 px-2 py-0.5 rounded border border-red-900/40">
                                                                {row.Delay_Reason}
                                                            </span>
                                                        ) : (
                                                            <span className="text-slate-500">Normal / On-time</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            <div className="px-4 py-3 border-t border-slate-800 bg-slate-950/50 flex flex-wrap items-center justify-between gap-3">
                                <span className="text-[10px] text-slate-400">
                                    Showing <strong className="text-neonBlue">{filteredDataset.length === 0 ? 0 : gridStartIndex + 1}</strong>
                                    {' '}to{' '}
                                    <strong className="text-neonBlue">{Math.min(gridStartIndex + GRID_PAGE_SIZE, filteredDataset.length)}</strong>
                                    {' '}of <strong className="text-white">{filteredDataset.length.toLocaleString()}</strong> filtered records.
                                    Metrics, charts, and exports still use the full filtered dataset.
                                </span>
                                <div className="flex items-center gap-2">
                                    <button
                                        type="button"
                                        disabled={gridPage <= 1}
                                        onClick={() => setGridPage(page => Math.max(1, page - 1))}
                                        className="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed border border-slate-700 rounded px-2.5 py-1 text-[10px] font-bold text-slate-200"
                                    >
                                        <i className="fa-solid fa-chevron-left mr-1"></i> Previous
                                    </button>
                                    <span className="text-[10px] text-slate-400">
                                        Page <strong className="text-white">{gridPage}</strong> / {totalGridPages}
                                    </span>
                                    <button
                                        type="button"
                                        disabled={gridPage >= totalGridPages}
                                        onClick={() => setGridPage(page => Math.min(totalGridPages, page + 1))}
                                        className="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed border border-slate-700 rounded px-2.5 py-1 text-[10px] font-bold text-slate-200"
                                    >
                                        Next <i className="fa-solid fa-chevron-right ml-1"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                    </main>

                    {/* FOOTER */}
                    <footer className="bg-slate-900 border-t border-slate-800/60 py-4 px-6 text-center text-[10px] text-slate-500 flex flex-wrap justify-between items-center gap-2">
                        <span>© 2026 MLS Inbound Logistics Console. All systems operational.</span>
                        <span>Made by <strong className="text-slate-400">Hussein Mustafa</strong></span>
                    </footer>

                </div>
            );
        }

        // Render standard entry point
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardErrorBoundary><App /></DashboardErrorBoundary>);
    </script>
</body>
</html>
