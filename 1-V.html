                                            </th>
                                            {/* Inbound Type Header */}
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>Inbound Type</span>
                                                    <select 
                                                        value={tableHeaderFilters['Inbound_Type'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Inbound_Type: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Inbound_Type').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            {/* Total Qty Header */}
                                            <th className="p-3 border-r border-slate-800">Total Qty</th>
                                            {/* Damage Qty Header */}
                                            <th className="p-3 border-r border-slate-800">Damage</th>
                                            {/* Shortage Header */}
                                            <th className="p-3 border-r border-slate-800">Shortage</th>
                                            {/* Total Pallets Header */}
                                            <th className="p-3 border-r border-slate-800">Pallets</th>
                                            {/* GRN Status Header */}
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>GRN Status</span>
                                                    <select 
                                                        value={tableHeaderFilters['GRN_Status'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, GRN_Status: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('GRN_Status').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            {/* GRN KPI Header */}
                                            <th className="p-3 border-r border-slate-800">
                                                <div className="flex flex-col gap-1">
                                                    <span>GRN KPI</span>
                                                    <select 
                                                        value={tableHeaderFilters['GRN_KPI'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, GRN_KPI: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('GRN_KPI').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                            {/* PO/ASN On Time Header */}
                                            <th className="p-3 border-r border-slate-800">On Time</th>
                                            {/* Off Loading Duration Header */}
                                            <th className="p-3 border-r border-slate-800">Duration</th>
                                            {/* Delay Reason Header */}
                                            <th className="p-3">
                                                <div className="flex flex-col gap-1">
                                                    <span>Delay Reason</span>
                                                    <select 
                                                        value={tableHeaderFilters['Delay_Reason'] || 'ALL'} 
                                                        onChange={(e) => setTableHeaderFilters(p => ({ ...p, Delay_Reason: e.target.value }))}
                                                        className="bg-slate-800 text-[9px] text-white border border-slate-700 rounded px-1 py-0.5 font-medium outline-none focus:border-neonBlue"
                                                    >
                                                        {getUniqueHeaderFilterOptions('Delay_Reason').map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                </div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800 bg-slate-900/40">
                                        {filteredDataset.length === 0 ? (
                                            <tr>
                                                <td colSpan="18" className="p-8 text-center text-slate-500 text-xs">
                                                    No operational logs match your active filters. Clear slicers or load a dataset.
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredDataset.map((row, index) => (
                                                <tr key={index} className="hover:bg-slate-800/50 transition">
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-400 font-mono">{row.Ser}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-semibold">{row.WH}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-300 font-medium whitespace-nowrap">{row.Date}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-neonBlue font-mono">{row.ASN}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-300 font-mono whitespace-nowrap">{row.Truck}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-semibold">{row.Division}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-400">{row.Trx_Type}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-400">{row.Shipment_Type}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-medium">{row.Inbound_Type}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-bold text-white">{row.Total_Qty.toLocaleString()}</td>
                                                    <td className={`p-3 border-r border-slate-800/60 font-bold ${row.Damage_Qty > 0 ? 'text-crimsonNeon bg-red-950/20' : 'text-slate-500'}`}>{row.Damage_Qty}</td>
                                                    <td className={`p-3 border-r border-slate-800/60 font-bold ${row.Shortage_Qty > 0 ? 'text-crimsonNeon bg-red-950/20' : 'text-slate-500'}`}>{row.Shortage_Qty}</td>
                                                    <td className="p-3 border-r border-slate-800/60 font-bold text-slate-300">{row.Total_Pallets}</td>
                                                    <td className="p-3 border-r border-slate-800/60">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                                                            row.GRN_Status === 'Sent' ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' :
                                                            row.GRN_Status === 'Received' ? 'bg-emerald-950 text-emerald-300 border border-emerald-900' :
                                                            'bg-amber-950 text-amber-400 border border-amber-800'
                                                        }`}>
                                                            {row.GRN_Status}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 border-r border-slate-800/60">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                                                            (row.GRN_KPI || '').toLowerCase() === 'on-time' || (row.GRN_KPI || '').toLowerCase() === 'received'
                                                                ? 'bg-emerald-950 text-emerald-400' 
                                                                : 'bg-red-950 text-red-400'
                                                        }`}>
                                                            {row.GRN_KPI || 'Pending'}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 border-r border-slate-800/60">{row.PO_On_Time || 'N/A'}</td>
                                                    <td className="p-3 border-r border-slate-800/60 text-slate-300 font-mono font-bold">{row.Off_Loading_Duration || '--'}</td>
                                                    <td className="p-3">
                                                        {row.Delay_Reason ? (
                                                            <span className="text-crimsonNeon font-medium bg-red-950/30 px-2 py-0.5 rounded border border-red-900/40">
                                                                {row.Delay_Reason}
                                                            </span>
                                                        ) : (
                                                            <span className="text-slate-500">Normal / On-time</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </main>

                    {/* FOOTER */}
                    <footer className="bg-slate-900 border-t border-slate-800/60 py-4 px-6 text-center text-[10px] text-slate-500 flex flex-wrap justify-between items-center gap-2">
                        <span>© 2026 MLS Inbound Logistics Console. All systems operational.</span>
                        <span>Made by <strong className="text-slate-400">Hussein Mustafa</strong></span>
                    </footer>

                </div>
            );
        }

        // Render standard entry point
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
